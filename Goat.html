<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wow-Brownie's Pink World</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffc0cb; /* Pastel Pink */
            font-family: 'Arial', sans-serif;
        }

        /* The Pink World Background */
        #world {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ffdee9 0%, #b5fffc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: -2;
        }

        /* Giant Background Rainbow */
        #rainbow-bg {
            position: absolute;
            font-size: 250px;
            opacity: 0.3;
            user-select: none;
            z-index: -1;
        }

        /* The Brownie Character */
        #brownie {
            position: absolute;
            width: 150px; /* Adjust size as needed */
            height: auto;
            cursor: pointer;
            filter: drop-shadow(0 0 15px #fff);
            z-index: 10;
        }

        /* Sparkle Effect */
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px #ff69b4;
            pointer-events: none;
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.5) translateY(20px); }
        }

        .title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #ff1493;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px white;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="title">✨ Wow-Brownie is Exploring! ✨</div>
    <div id="world">
        <div id="rainbow-bg">🌈</div>
    </div>

    <img src="Wow-brownie.jpg" id="brownie" alt="Wow-Brownie">

    <script>
        const brownie = document.getElementById('brownie');
        
        // Randomly move the brownie around
        function moveBrownie() {
            const maxX = window.innerWidth - brownie.clientWidth;
            const maxY = window.innerHeight - brownie.clientHeight;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            brownie.style.transition = "all 2s ease-in-out";
            brownie.style.left = randomX + "px";
            brownie.style.top = randomY + "px";

            // Flip based on direction
            const currentX = parseInt(brownie.style.left) || 0;
            brownie.style.transform = randomX > currentX ? "scaleX(1)" : "scaleX(-1)";
        }

        // Leave sparkles behind
        function createSparkle() {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const rect = brownie.getBoundingClientRect();
            
            sparkle.style.left = (rect.left + rect.width/2) + "px";
            sparkle.style.top = (rect.top + rect.height/2) + "px";
            
            document.body.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        }

        // Run the animations
        setInterval(moveBrownie, 2000);
        setInterval(createSparkle, 100);
        
        // Initial move
        moveBrownie();

    </script>
</body>
</html>

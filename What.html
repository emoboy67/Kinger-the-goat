<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crown Catcher Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #16213e, #0f3460);
            border: 4px solid #e94560;
            border-radius: 10px;
            overflow: hidden;
            cursor: none;
        }

        #crown {
            position: absolute;
            bottom: 20px;
            left: 50%;
            font-size: 50px;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
            user-select: none;
        }

        .computer {
            position: absolute;
            font-size: 40px;
            user-select: none;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 10px;
            width: 80%;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover { background: #ff4d6d; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui">
        Score: <span id="score">0</span><br>
        Misses: <span id="misses">0</span>/3
    </div>

    <div id="crown">👑</div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>Final Score: <span id="final-score">0</span></p>
        <button onclick="resetGame()">Try Again</button>
    </div>
</div>

<script>
    const container = document.getElementById('game-container');
    const crown = document.getElementById('crown');
    const scoreElement = document.getElementById('score');
    const missElement = document.getElementById('misses');
    const gameOverScreen = document.getElementById('game-over');
    const finalScoreElement = document.getElementById('final-score');

    let score = 0;
    let misses = 0;
    let gameActive = true;
    let gameSpeed = 3;

    // Move Crown with Mouse
    container.addEventListener('mousemove', (e) => {
        if (!gameActive) return;
        const rect = container.getBoundingClientRect();
        let x = e.clientX - rect.left;
        
        // Keep crown inside bounds
        if (x < 25) x = 25;
        if (x > 375) x = 375;
        
        crown.style.left = x + 'px';
    });

    function createComputer() {
        if (!gameActive) return;

        const computer = document.createElement('div');
        computer.className = 'computer';
        computer.innerHTML = '💻';
        computer.style.left = Math.random() * (container.offsetWidth - 40) + 'px';
